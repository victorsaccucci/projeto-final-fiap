spring:
  datasource:
    url: jdbc:h2:mem:sussmartassistant;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # Dev: desabilita Redis e RabbitMQ
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  rabbitmq:
    listener:
      simple:
        missing-queues-fatal: false
        auto-startup: false

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true

logging:
  level:
    com.sussmartassistant: DEBUG
    org.hibernate.SQL: DEBUG
