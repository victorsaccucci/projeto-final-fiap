version: '3.8'

services:
  app:
    build: .
    container_name: sus-smart-assistant
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sussmartassistant
      DB_USER: postgres
      DB_PASS: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      JWT_SECRET: susSm4rtAss1st4ntPr0dK3y2026!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sus-network

  postgres:
    image: postgres:16-alpine
    container_name: sus-postgres
    environment:
      POSTGRES_DB: sussmartassistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sus-network

  redis:
    image: redis:7-alpine
    container_name: sus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sus-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sus-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sus-network

  ollama:
    image: ollama/ollama:latest
    container_name: sus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sus-network

volumes:
  postgres_data:
  ollama_data:

networks:
  sus-network:
    driver: bridge
